<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AOI 检测设备系列 - 自动光学检测设备，2D/3D 检测可选，快速识别焊接缺陷，提高产品质量">
    <meta name="keywords" content="AOI 检测设备，自动光学检测，SMT 检测，2D 检测，3D 检测，焊接检测">
    <title>AOI 检测设备系列 - 北京仝志伟业</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root { --primary: #0066CC; --secondary: #FF6600; --dark: #003366; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .navbar { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu a { text-decoration: none; color: #333; font-weight: 500; }
        .page-header { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 150px 0 80px; text-align: center; margin-top: 60px; }
        .page-header h1 { font-size: 48px; margin-bottom: 15px; }
        .products-section { padding: 80px 0; }
        .section-title { font-size: 36px; color: var(--dark); margin-bottom: 40px; text-align: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border: 2px solid #e0e0e0; border-radius: 8px; padding: 30px; transition: transform 0.3s, box-shadow 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .product-card h3 { color: var(--primary); margin-bottom: 15px; font-size: 24px; }
        .product-card p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .product-link { display: block; text-align: center; padding: 12px; background: var(--primary); color: white; text-decoration: none; font-weight: 600; border-radius: 4px; }
        .footer { background: #1a1a1a; color: #ccc; padding: 40px 0 20px; margin-top: 60px; }
        .footer-bottom { text-align: center; padding-top: 20px; border-top: 1px solid #333; }
        @media (max-width: 768px) { .nav-menu { display: none; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">仝志伟业</a>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/products/">产品中心</a></li>
                <li><a href="/about/">关于我们</a></li>
                <li><a href="/news/">新闻中心</a></li>
                <li><a href="/contact/">联系我们</a></li>
            </ul>
        </div>
    </nav>
    <section class="page-header">
        <div class="container">
            <h1>AOI 检测设备系列</h1>
            <p>自动光学检测解决方案</p>
        </div>
    </section>
    <section class="products-section">
        <div class="container">
            <h2 class="section-title">产品型号</h2>
            <div class="products-grid">
                <div class="product-card">
                    <h3>2D AOI 检测设备</h3>
                    <p>2D 光学检测，快速准确</p>
                    <a href="/products/aoi/2d/" class="product-link">查看详情 →</a>
                </div>
                <div class="product-card">
                    <h3>3D AOI 检测设备</h3>
                    <p>3D 立体检测，精度更高</p>
                    <a href="/products/aoi/3d/" class="product-link">查看详情 →</a>
                </div>
                <div class="product-card">
                    <h3>在线式 AOI</h3>
                    <p>在线自动检测，适合流水线</p>
                    <a href="/products/aoi/inline/" class="product-link">查看详情 →</a>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 北京仝志伟业 版权所有</p>
            </div>
        </div>
    </footer>
    <script src="/js/main.js"></script>
</body>
</html>
